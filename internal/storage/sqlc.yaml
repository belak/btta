version: "2"
sql:
  - engine: "sqlite"
    queries: "queries.sql"
    schema:
      - "migrations"
    gen:
      go:
        package: "db"
        sql_package: "database/sql"
        out: "../db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "datetime"
            go_type: "time.Time"
